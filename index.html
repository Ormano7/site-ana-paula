<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ana Paula – Deputada Estadual | Piauí</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #2db542;
    --verde-escuro: #1a8a2e;
    --amarelo: #f5d800;
    --preto: #0d0d0d;
    --branco: #ffffff;
    --navbar-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Montserrat', sans-serif;
    background-color: #f4f4ee;
    background-image: url('assets/bandeir.png');
    background-size: cover;
    background-attachment: fixed;
    background-position: center center;
    color: var(--preto);
    overflow-x: hidden;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ======= NAVBAR ======= */
  .navbar {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    height: var(--navbar-h);
    background: rgb(255, 253, 253);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(245,216,0,0.25);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 900;
    transition: background 0.3s ease, backdrop-filter 0.3s ease, box-shadow 0.3s ease;
  }

  .navbar.scrolled {
    background: rgba(255, 255, 255, 0.65);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  }

  .navbar.scrolled .navbar-link:hover {
    color: var(--verde-escuro);
  }

  .navbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .navbar-logo-circle {
    width: 46px;
    height: 46px;
    border-radius: 10px;
    background: transparent;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .navbar-logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .navbar-brand {
    font-family: 'Dancing Script', cursive;
    font-size: 20px;
    color: var(--branco);
    line-height: 1;
  }

  .navbar-brand small {
    display: block;
    font-family: 'Montserrat', sans-serif;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--amarelo);
    margin-top: 2px;
  }

  .navbar-links {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .navbar-link {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: rgba(10, 199, 26, 0.65);
    text-decoration: none;
    padding: 6px 9px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }

  .navbar-link:hover,
  .navbar-link.active {
    color: var(--amarelo);
    background: rgba(245,216,0,0.1);
  }

  /* ======= HERO — CORRIGIDO =======
     O container ocupa a tela menos a navbar.
     As imagens preenchem 100% desse container, sem transbordamento.
  ======= */
  .hero {
    position: relative;
    /* Desconta exatamente a altura da navbar para não esconder conteúdo */
    height: calc(100svh - var(--navbar-h));
    min-height: 500px;
    margin-top: var(--navbar-h); /* empurra o hero para baixo da navbar fixa */
    overflow: hidden;
  }

  .hero-slides {
    display: flex;
    height: 100%;
    transition: transform 0.5s ease-in-out;
  }

  .hero-slide {
    height: 100%;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }

  /* object-fit: cover garante que a imagem preenche o slide sem vazar */
  .hero-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .hero-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 12px;
    pointer-events: none;
  }

  .hero-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    font-size: 22px;
    cursor: pointer;
    pointer-events: all;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.2s;
  }

  .hero-btn:active { background: rgba(245,216,0,0.45); }

  .hero-dots {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }

  .hero-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: all 0.3s;
    border: 1px solid rgba(0,0,0,0.15);
  }

  .hero-dot.active {
    background: var(--amarelo);
    width: 26px;
    border-radius: 4px;
  }

  /* ======= SEÇÃO CLARA ======= */
  .section-light {
    padding: 48px 0 36px;
    background: rgba(255,255,255,0.84);
    backdrop-filter: blur(6px);
  }

  /* ======= SEÇÃO ESCURA ======= */
  .section-dark {
    padding: 48px 0 40px;
    background: rgba(255, 255, 255, 0.125);
    backdrop-filter: blur(6px);
    position: relative;
    overflow: hidden;
  }

  .section-dark::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(45,181,66,0.2) 0%, transparent 70%);
    pointer-events: none;
  }

  .section-dark::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,216,0,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ======= HEADER DE SEÇÃO ======= */
  .sec-head { padding: 0 24px 20px; }

  .sec-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .section-light .sec-label { color: var(--verde-escuro); }
  .section-dark  .sec-label { color: var(--verde-escuro); }

  .sec-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 0.95;
  }

  .section-light .sec-title { color: var(--amarelo); }
  .section-dark  .sec-title { color: var(--amarelo); }

  .sec-title span { color: var(--verde); }

  .sec-bar {
    width: 48px;
    height: 4px;
    background: var(--amarelo);
    border-radius: 2px;
    margin-top: 14px;
  }

  /* ======= CARROSSEL ======= */
  .carr-wrap {
    overflow: hidden;
    padding-bottom: 6px;
    margin-top: 6px;
  }

  .carr-track {
    display: flex;
    gap: 16px;
    padding: 8px 24px;
    transition: transform 0.5s cubic-bezier(0.77,0,0.18,1);
    will-change: transform;
  }

  .carr-card {
    min-width: 280px;
    border-radius: 20px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 6px 28px rgba(0,0,0,0.18);
    background: #ddd;
  }

  .carr-card img {
    width: 100%;
    height: 380px;
    object-fit: cover;
    display: block;
  }

  .carr-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 18px;
    padding-bottom: 4px;
  }

  .carr-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.3s;
  }

  .section-light .carr-dot { background: rgba(0,0,0,0.15); }
  .section-dark  .carr-dot { background: rgba(0,0,0,0.15); }

  .carr-dot.active {
    background: var(--verde);
    width: 22px;
    border-radius: 4px;
  }

  /* ======= SCROLL HINT ======= */
  .scroll-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 24px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .section-light .scroll-hint { color: rgba(0,0,0,0.3); }
  .section-dark  .scroll-hint { color: rgba(255,255,255,0.3); }

  .s-arrow {
    animation: arr 1.3s ease-in-out infinite;
    display: inline-block;
  }

  @keyframes arr {
    0%,100% { transform: translateX(0); opacity:.3; }
    50%     { transform: translateX(4px); opacity:1; }
  }

  /* ======= DIVISOR ======= */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    background: rgba(255,255,255,0.84);
    backdrop-filter: blur(6px);
  }

  .div-line { flex:1; height:1px; background:rgba(0,0,0,0.1); }
  .div-star  { color:var(--verde); font-size:18px; padding: 16px 0; }

  /* ======= RODAPÉ — CORRIGIDO =======
     A foto agora tem altura automática (auto) para mostrar
     a imagem inteira sem cortes, em vez de altura fixa.
  ======= */
  footer { background: var(--branco); }

  .foot-photo {
    position: relative;
    /* height: auto deixa a imagem mostrar na sua proporção original */
    overflow: hidden;
  }

  .foot-photo img {
    width: 100%;
    height: auto;            /* altura proporcional — sem corte */
    object-fit: contain;     /* garante que tudo seja visível */
    display: block;
  }

  .foot-photo-grad {
    display: none;
  }

  .foot-photo-text {
    position: absolute;
    bottom: 24px;
    left: 24px;
  }

  .foot-photo-text .fn {
    font-family: 'Dancing Script', cursive;
    font-size: 48px;
    color: var(--branco);
    line-height: 1;
  }

  .foot-photo-text .fc {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--amarelo);
    font-weight: 700;
  }

  .foot-body { padding: 32px 24px 48px; }

  .foot-frase {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    line-height: 1;
    color: var(--verde);
    margin-bottom: 28px;
  }

  .foot-frase span { color: var(--amarelo); }

  .soc-title {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgb(0, 0, 0);
    margin-bottom: 16px;
    font-weight: 700;
  }

  .soc-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .soc-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 12px;
    font-weight: 700;
    color: var(--branco);
    transition: transform 0.15s, opacity 0.15s;
  }

  .soc-link:active { transform: scale(0.94); opacity:.8; }
  .soc-link.ig  { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
  .soc-link.fb  { background: #1877f2; }
  .soc-link.yt  { background: #ff0000; }
  .soc-link.tt  { background:#111; border:1px solid rgba(255,255,255,0.15); }

  .soc-icon { width:18px; height:18px; flex-shrink:0; }

  .foot-copy {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(10, 10, 10, 0.003);
    font-size: 11px;
    color: rgb(14, 14, 14);
    text-align: center;
    line-height: 1.7;
  }

  /* ======= WHATSAPP FAB ======= */
  .wa-fab {
    position: fixed;
    bottom: 24px;
    right: 16px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: #25d366;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(37,211,102,0.5);
    text-decoration: none;
    z-index: 1000;
    animation: wa-pulse 2.5s infinite;
    transition: transform 0.2s;
  }

  .wa-fab:active { transform: scale(0.9); }
  .wa-fab svg { width:30px; height:30px; fill:white; }

  .wa-tip {
    position: fixed;
    bottom: 33px;
    right: 84px;
    background: var(--branco);
    color: var(--preto);
    font-size: 11px;
    font-weight: 700;
    padding: 7px 13px;
    border-radius: 8px;
    white-space: nowrap;
    z-index: 999;
    pointer-events: none;
    opacity: 0;
    transform: translateX(8px);
    animation: wa-tip-show 0.4s ease 2.5s forwards;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }

  .wa-tip::after {
    content:'';
    position:absolute;
    right:-6px; top:50%;
    transform:translateY(-50%);
    border:6px solid transparent;
    border-right:none;
    border-left-color:var(--branco);
  }

  @keyframes wa-pulse {
    0%,100% { box-shadow: 0 4px 20px rgba(37,211,102,0.5); }
    50%      { box-shadow: 0 4px 36px rgba(37,211,102,0.8), 0 0 0 10px rgba(37,211,102,0.08); }
  }

  @keyframes wa-tip-show {
    to { opacity:1; transform:translateX(0); }
  }
</style>
</head>

<script>
// ======= NAVBAR SCROLL =======
const navbar = document.querySelector('.navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

// ======= HERO =======
const hSlides = document.getElementById('heroSlides');
const hDots   = document.getElementById('heroDots');
let hIdx = 0;
const hSlideEls = hSlides.querySelectorAll('.hero-slide');
const hTotal    = hSlideEls.length;

// Define larguras dinamicamente para qualquer nº de slides
// O track tem largura = hTotal × 100% do container
hSlides.style.width = (hTotal * 100) + '%';
hSlideEls.forEach(slide => {
  slide.style.width = (100 / hTotal) + '%';
});

for (let i = 0; i < hTotal; i++) {
  const d = document.createElement('div');
  d.className = 'hero-dot' + (i === 0 ? ' active' : '');
  d.onclick = () => goH(i);
  hDots.appendChild(d);
}

function goH(n) {
  hIdx = (n + hTotal) % hTotal;
  // Translada pelo percentual correto dentro do track expandido
  hSlides.style.transform = `translateX(-${hIdx * (100 / hTotal)}%)`;
  hDots.querySelectorAll('.hero-dot').forEach((d,i) => d.classList.toggle('active', i === hIdx));
}

document.getElementById('heroPrev').onclick = () => goH(hIdx - 1);
document.getElementById('heroNext').onclick = () => goH(hIdx + 1);
setInterval(() => goH(hIdx + 1), 4800);

let hTx = null;
let hTy = null;
let hSwiping = false;

hSlides.addEventListener('touchstart', e => {
  hTx = e.touches[0].clientX;
  hTy = e.touches[0].clientY;
  hSwiping = false;
}, { passive: true });

hSlides.addEventListener('touchmove', e => {
  if (hTx === null) return;
  const dx = Math.abs(e.touches[0].clientX - hTx);
  const dy = Math.abs(e.touches[0].clientY - hTy);
  if (dx > dy && dx > 8) hSwiping = true;
}, { passive: true });

hSlides.addEventListener('touchend', e => {
  if (hTx === null) return;
  const diff = hTx - e.changedTouches[0].clientX;
  if (hSwiping && Math.abs(diff) > 30) goH(hIdx + (diff > 0 ? 1 : -1));
  hTx = null;
  hTy = null;
  hSwiping = false;
});

// ======= CARROSSEL GENÉRICO =======
function initCarr(trackId, dotsId) {
  const track = document.getElementById(trackId);
  const dotsEl = document.getElementById(dotsId);
  if (!track || !dotsEl) return;

  const cards = track.querySelectorAll('.carr-card');
  const total = cards.length;
  let idx = 0;

  dotsEl.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'carr-dot' + (i === 0 ? ' active' : '');
    d.onclick = () => go(i);
    dotsEl.appendChild(d);
  }

  function go(n) {
    // Circular: volta ao último se tentar ir antes do primeiro, e vice-versa
    idx = (n + total) % total;
    const w = cards[0].offsetWidth + 16;
    track.style.transform = `translateX(-${idx * w}px)`;
    dotsEl.querySelectorAll('.carr-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  }

  // Touch com prevenção de conflito com scroll vertical
  let txStart = null;
  let tyStart = null;
  let isSwiping = false;

  track.addEventListener('touchstart', e => {
    txStart = e.touches[0].clientX;
    tyStart = e.touches[0].clientY;
    isSwiping = false;
  }, { passive: true });

  track.addEventListener('touchmove', e => {
    if (txStart === null) return;
    const dx = Math.abs(e.touches[0].clientX - txStart);
    const dy = Math.abs(e.touches[0].clientY - tyStart);
    // Só considera swipe horizontal se X for maior que Y
    if (dx > dy && dx > 8) {
      isSwiping = true;
    }
  }, { passive: true });

  track.addEventListener('touchend', e => {
    if (txStart === null) return;
    const diff = txStart - e.changedTouches[0].clientX;
    if (isSwiping && Math.abs(diff) > 30) {
      go(idx + (diff > 0 ? 1 : -1));
    }
    txStart = null;
    tyStart = null;
    isSwiping = false;
  });
}

initCarr('track1', 'dots1');
initCarr('track2', 'dots2');

// ======= NAVBAR ACTIVE =======
const navLinks = document.querySelectorAll('.navbar-link');
const anchors  = ['inicio','projetos','contato'].map(id => document.getElementById(id));

window.addEventListener('scroll', () => {
  const y = window.scrollY + 80;
  let cur = 0;
  anchors.forEach((el, i) => { if (el && el.offsetTop <= y) cur = i; });
  navLinks.forEach((l,i) => l.classList.toggle('active', i === cur));
}, {passive:true});
</script>
