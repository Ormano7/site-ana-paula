<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ana Paula – Deputada Estadual | Piauí</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #2db542;
    --verde-escuro: #1a8a2e;
    --amarelo: #f5d800;
    --preto: #0d0d0d;
    --branco: #ffffff;
    --navbar-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Montserrat', sans-serif;
    background-color: #f4f4ee;
    background-image: url('bandeir.png');
    background-size: cover;
    background-attachment: fixed;
    background-position: center;
    color: var(--preto);
    overflow-x: hidden;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ======= NAVBAR ======= */
  .navbar {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    height: var(--navbar-h);
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 1000;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }

  .navbar-logo-circle { width: 46px; height: 46px; }
  .navbar-logo-circle img { height: 100%; width: auto; object-fit: contain; }
  .navbar-link {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--verde-escuro);
    text-decoration: none;
    padding: 8px 12px;
  }

  /* ======= HERO (O CARROSSEL DO TOPO) ======= */
  .hero {
    position: relative;
    height: 80vh;
    margin-top: var(--navbar-h);
    overflow: hidden;
  }
  .hero-slides {
    display: flex;
    height: 100%;
    transition: transform 0.5s ease-in-out;
  }
  .hero-slide { min-width: 100%; height: 100%; }
  .hero-slide img { width: 100%; height: 100%; object-fit: cover; }

  /* ======= CARROSSEL DE PROJETOS (A PARTE QUE DAVA ERRO) ======= */
  .carr-wrap {
    width: 100%;
    overflow-x: auto; /* Permite deslizar com o dedo */
    scroll-snap-type: x mandatory; /* Efeito de imã no card */
    display: flex;
    gap: 15px;
    padding: 10px 24px 30px;
    -webkit-overflow-scrolling: touch;
  }
  .carr-wrap::-webkit-scrollbar { display: none; } /* Esconde a barra de rolagem */

  .carr-card {
    min-width: 85%; /* Aparece um pedaço do próximo para mostrar que tem mais */
    scroll-snap-align: center;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    background: #eee;
  }
  .carr-card img { width: 100%; height: 400px; object-fit: cover; display: block; }

  /* ======= SEÇÕES ======= */
  .section-light { padding: 48px 0; background: rgba(255,255,255,0.85); }
  .section-dark { padding: 48px 0; background: rgba(255,255,255,0.1); backdrop-filter: blur(6px); }

  .sec-head { padding: 0 24px 20px; }
  .sec-label { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: var(--verde-escuro); }
  .sec-title { font-family: 'Bebas Neue'; font-size: 42px; line-height: 0.95; }
  .sec-title span { color: var(--verde); }
  .sec-bar { width: 48px; height: 4px; background: var(--amarelo); margin-top: 10px; }

  /* ======= FOOTER ======= */
  footer { background: #fff; padding-bottom: 40px; }
  .foot-photo { height: 320px; width: 100%; }
  .foot-photo img { width: 100%; height: 100%; object-fit: cover; }
  .foot-body { padding: 32px 24px; }
  .foot-frase { font-family: 'Bebas Neue'; font-size: 34px; color: var(--verde); line-height: 1; }
  .soc-links { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .soc-link { padding: 10px 16px; border-radius: 50px; text-decoration: none; color: #fff; font-size: 12px; font-weight: 700; }
  .soc-link.ig { background: linear-gradient(45deg, #f09433, #bc1888); }
  
  .wa-fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    background: #25d366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1001;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-logo-circle">
    <img src="assets/logo sem fundo.png" alt="Logo">
  </div>
  <div class="navbar-links">
    <a href="#inicio" class="navbar-link">Início</a>
    <a href="#projetos" class="navbar-link">Projetos</a>
  </div>
</nav>

<section class="hero" id="inicio">
  <div class="hero-slides" id="heroSlides">
    <div class="hero-slide"><img src="assets/2026.png"></div>
    <div class="hero-slide"><img src="assets/carrossel 1.jpg"></div>
    <div class="hero-slide"><img src="assets/carrossel 2.jpg"></div>
  </div>
</section>

<section class="section-light" id="projetos">
  <div class="sec-head">
    <div class="sec-label">✅ LEGISLATURA 2023–2026</div>
    <div class="sec-title">Projetos<br><span>Aprovados</span></div>
    <div class="sec-bar"></div>
  </div>

  <div class="carr-wrap">
    <div class="carr-card"><img src="assets/clip1.jpg"></div>
    <div class="carr-card"><img src="assets/clip2.jpg"></div>
    <div class="carr-card"><img src="assets/clip3.jpg"></div>
    <div class="carr-card"><img src="assets/clip4.jpg"></div>
    <div class="carr-card"><img src="assets/clip5.jpg"></div>
  </div>
</section>

<section class="section-dark">
  <div class="sec-head">
    <div class="sec-label">🎯 PRÓXIMOS PASSOS</div>
    <div class="sec-title">Compromissos<br><span>com o Piauí</span></div>
    <div class="sec-bar"></div>
  </div>

  <div class="carr-wrap">
    <div class="carr-card"><img src="assets/projeto4.jpg"></div>
    <div class="carr-card"><img src="assets/projeto1.jpg"></div>
    <div class="carr-card"><img src="assets/projeto6.jpg"></div>
  </div>
</section>

<footer>
  <div class="foot-photo"><img src="assets/foot.png"></div>
  <div class="foot-body">
    <div class="foot-frase">AO LADO DE<br><span style="color:var(--amarelo)">QUEM PRECISA.</span></div>
    <div class="soc-links">
      <a href="#" class="soc-link ig">Instagram</a>
      <a href="#" class="soc-link ig" style="background:#1877f2">Facebook</a>
    </div>
    <p style="text-align:center; font-size:11px; margin-top:30px; color:#666;">
      © 2026 Deputada Ana Paula · Produzido por Paulo Ormano
    </p>
  </div>
</footer>

<script>
  // Controle do Hero (Carrossel do topo) - Muda a cada 4 segundos
  const slides = document.getElementById('heroSlides');
  let index = 0;
  setInterval(() => {
    index = (index + 1) % 3;
    slides.style.transform = `translateX(-${index * 100}%)`;
  }, 4000);
</script>

</body>
</html>
